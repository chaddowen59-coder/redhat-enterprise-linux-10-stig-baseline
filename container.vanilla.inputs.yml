lock_delay: 5
difok: 8
min_reuse_generations: 5
min_len: 15
days_of_inactivity: 0
unsuccessful_attempts: 3
fail_interval: 900
lockout_time: 604800

file_integrity_tool: "aide"
file_integrity_interval: "weekly"

system_activity_timeout: 600
client_alive_interval: 600

smart_card_enabled: false

log_pkg_path: "/etc/rsyslog.conf"

exempt_home_users: []

grub_conf_path: "/etc/grub2.cfg"
grub_user_conf_path: "/boot/grub2/user.cfg"
disallowed_grub_superusers: ["root", "admin", "administrator"]

admin_logins: []

multifactor_enabled: false

non_interactive_shells:
  [
    "/sbin/nologin",
    "/sbin/halt",
    "/sbin/shutdown",
    "/bin/false",
    "/bin/sync",
    "/bin/true",
  ]

randomize_va_space: 2
non_removable_media_fs: ["xfs", "ext4", "swap", "tmpfs"]
approved_tunnels: []
virtual_machine: true

# Allow OpenSSH server in vanilla container
allow_container_openssh_server: true
physical_protections_employed: false
